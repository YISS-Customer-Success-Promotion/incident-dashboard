<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS推進部 インシデントダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Meiryo', 'Yu Gothic', sans-serif; background: #F0F4F8; color: #1A2A3A; font-size: 13px; }
  header { background: #1E3A5F; color: #fff; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 16px; font-weight: bold; }
  header .meta { font-size: 12px; color: #CADCFC; text-align: right; line-height: 1.6; }

  #input-section { background: #fff; border-bottom: 2px solid #1E3A5F; padding: 14px 20px; }
  #input-section h2 { font-size: 13px; font-weight: bold; color: #1E3A5F; margin-bottom: 8px; }

  /* ドロップゾーン */
  #drop-zone {
    border: 2px dashed #B0C4D8; border-radius: 10px;
    padding: 28px 20px; text-align: center;
    cursor: pointer; margin-bottom: 12px;
    transition: all 0.2s; background: #F7FAFD;
  }
  #drop-zone.dragover { border-color: #1E3A5F; background: #EEF3F9; }
  #drop-zone.loaded  { border-color: #1D9E75; background: #E8F8F2; }
  #drop-zone .icon { font-size: 32px; margin-bottom: 6px; }
  #drop-zone .label { font-size: 13px; color: #4A6080; }
  #drop-zone .label b { color: #1E3A5F; }
  #drop-zone .sub { font-size: 11px; color: #888; margin-top: 4px; }
  #drop-zone input[type=file] { display: none; }
  #file-name { font-size: 12px; color: #1D9E75; font-weight: bold; margin-top: 6px; }

  /* テキスト貼り付けエリア（折りたたみ） */
  .paste-toggle { font-size: 11px; color: #378ADD; cursor: pointer; margin-bottom: 6px; display: inline-block; }
  #paste-area { display: none; margin-bottom: 10px; }
  #raw-input { width: 100%; height: 90px; font-size: 11px; font-family: monospace; border: 1px solid #B0C4D8; border-radius: 6px; padding: 8px; resize: vertical; }

  .meta-inputs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .meta-inputs .field label { font-size: 11px; color: #4A6080; display: block; margin-bottom: 3px; }
  .meta-inputs .field input { font-size: 12px; border: 1px solid #B0C4D8; border-radius: 4px; padding: 4px 8px; width: 150px; }
  .meta-note { font-size: 11px; color: #888; }
  .bottom-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  #btn-apply { background: #1E3A5F; color: #fff; border: none; border-radius: 6px; padding: 9px 24px; font-size: 13px; font-weight: bold; cursor: pointer; }
  #btn-apply:hover { background: #2C5282; }
  #format-badge { font-size: 10px; padding: 2px 10px; border-radius: 99px; background: #EEF3F9; color: #1E3A5F; }
  #error-msg { color: #E24B4A; font-size: 12px; margin-top: 8px; display: none; padding: 6px 10px; background: #FFF0F0; border-radius: 4px; }

  .container { max-width: 1280px; margin: 0 auto; padding: 14px 16px; }
  #dashboard { display: none; }

  .metrics { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 14px; }
  .metric { background: #fff; border-radius: 8px; padding: 10px 14px; border: 0.5px solid #dde3ea; }
  .metric-label { font-size: 11px; color: #4A6080; margin-bottom: 4px; }
  .metric-val { font-size: 26px; font-weight: bold; color: #1E3A5F; }
  .metric-val.down { color: #1D9E75; }
  .metric-val.up   { color: #E24B4A; }
  .metric-sub { font-size: 10px; color: #4A6080; margin-top: 2px; }

  .alerts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .alert { border-radius: 8px; padding: 10px 14px; border: 1px solid; }
  .alert-title { font-size: 12px; font-weight: bold; margin-bottom: 4px; }
  .alert-body  { font-size: 11px; line-height: 1.5; }
  .alert.danger { background: #FFF0F0; border-color: #E24B4A; }
  .alert.danger .alert-title { color: #7A1212; }
  .alert.danger .alert-body  { color: #9B3030; }
  .alert.warn { background: #FFF5E6; border-color: #BA7517; }
  .alert.warn .alert-title { color: #5C3000; }
  .alert.warn .alert-body  { color: #7A4A00; }
  .alert.ok { background: #E8F8F2; border-color: #1D9E75; }
  .alert.ok .alert-title { color: #0A4A30; }
  .alert.ok .alert-body  { color: #145C3A; }

  .charts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .chart-card { background: #fff; border-radius: 8px; padding: 12px; border: 0.5px solid #dde3ea; }
  .chart-card h3 { font-size: 12px; font-weight: bold; color: #1E3A5F; margin-bottom: 8px; }
  .chart-wrap { position: relative; width: 100%; }

  .table-card { background: #fff; border-radius: 8px; padding: 12px; border: 0.5px solid #dde3ea; margin-bottom: 14px; overflow-x: auto; }
  .table-card h3 { font-size: 12px; font-weight: bold; color: #1E3A5F; margin-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { background: #1E3A5F; color: #fff; padding: 6px 8px; text-align: center; font-size: 10px; white-space: nowrap; }
  td { padding: 5px 8px; border-bottom: 0.5px solid #E0E8F0; text-align: center; white-space: nowrap; }
  td.svc { text-align: left; font-weight: bold; }
  tr:nth-child(even) td { background: #F5F8FC; }
  tr.total-row td { background: #EEF3F9 !important; font-weight: bold; }
  .badge { display: inline-block; font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 99px; }
  .badge.danger { background: #FCEBEB; color: #A32D2D; border: 1px solid #E24B4A; }
  .badge.warn   { background: #FAEEDA; color: #7A4A00; border: 1px solid #BA7517; }
  .badge.ok     { background: #E1F5EE; color: #0F6E56; border: 1px solid #1D9E75; }
  .action-table td { text-align: left; }
  .action-table td.center { text-align: center; }
  footer { text-align: center; font-size: 10px; color: #888; padding: 16px; }
</style>
</head>
<body>

<header>
  <h1>CS推進部 インシデントダッシュボード</h1>
  <div class="meta" id="header-meta">CSVファイルをドロップしてください</div>
</header>

<div id="input-section">
  <h2>データ入力</h2>

  <!-- ドロップゾーン -->
  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="icon">📂</div>
    <div class="label"><b>CSVファイルをここにドラッグ＆ドロップ</b></div>
    <div class="sub">またはクリックしてファイルを選択（data.csv）</div>
    <div id="file-name"></div>
    <input type="file" id="file-input" accept=".csv,.txt">
  </div>

  <!-- テキスト貼り付け（折りたたみ） -->
  <span class="paste-toggle" onclick="togglePaste()">▶ テキスト直接貼り付けはこちら</span>
  <div id="paste-area">
    <textarea id="raw-input" placeholder="ExcelからコピーしたテキストまたはCSV内容をここに貼り付け..."></textarea>
  </div>

  <div class="meta-inputs">
    <div class="field">
      <label>対象週</label>
      <input type="text" id="meta-week" placeholder="例: 6/8〜6/19">
    </div>
    <div class="field">
      <label>スナップショット日</label>
      <input type="text" id="meta-date" placeholder="例: 6/16">
    </div>
    <div class="field">
      <label>残数（障害・イベント除く）<br><span class="meta-note">※CSVに含まれる場合は自動取得</span></label>
      <input type="number" id="meta-total" placeholder="例: 260">
    </div>
  </div>

  <div class="bottom-row">
    <button id="btn-apply" onclick="applyData()">▶ 反映</button>
    <span id="format-badge">形式: 未検出</span>
  </div>
  <div id="error-msg"></div>
</div>

<div class="container">
  <div id="dashboard">
    <div class="metrics" id="metrics"></div>
    <div class="alerts"  id="alerts"></div>
    <div class="charts">
      <div class="chart-card">
        <h3>残数（障害・イベント除く）サービス別</h3>
        <div class="chart-wrap" style="height:220px"><canvas id="chart-zansu"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>受付 vs 完了（週間）</h3>
        <div class="chart-wrap" style="height:220px"><canvas id="chart-rcbar"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>受付カテゴリ内訳</h3>
        <div class="chart-wrap" style="height:220px"><canvas id="chart-donut"></canvas></div>
      </div>
    </div>
    <div class="table-card">
      <h3>サービス別 残数明細</h3>
      <table id="table-zansu"></table>
    </div>
    <div class="table-card">
      <h3>ネクストアクション</h3>
      <table class="action-table" id="table-action"></table>
    </div>
  </div>
</div>
<footer id="footer">CS推進部 インシデントダッシュボード</footer>

<script>
const COLS = ['障害','イベント','問い合わせ','定例運用','非定例運用','相談','クレーム','作業依頼'];
const C = { blue:'#378ADD', teal:'#1D9E75', red:'#E24B4A', amber:'#BA7517', coral:'#D85A30', purple:'#7F77DD', gray:'#888780' };
let chartInstances = {};

// ===== ドロップゾーン =====
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const text = ev.target.result;
    document.getElementById('raw-input').value = text;
    document.getElementById('file-name').textContent = '✅ ' + file.name + ' を読み込みました';
    dropZone.classList.add('loaded');
    dropZone.querySelector('.label').innerHTML = `<b>${file.name}</b>`;
    dropZone.querySelector('.sub').textContent = 'ファイル読み込み完了。「反映」を押してください。';
    // CSV内のmetaを先読みしてフォームに反映
    preloadMeta(text);
  };
  reader.readAsText(file, 'UTF-8');
}

function preloadMeta(text) {
  const lines = text.trim().split('\n');
  lines.forEach(line => {
    const cells = line.split(',').map(c => c.trim());
    if (cells[0] === 'meta' && cells[1] === 'week')          document.getElementById('meta-week').value  = cells[2] || '';
    if (cells[0] === 'meta' && cells[1] === 'snapshot_date') document.getElementById('meta-date').value  = cells[2] || '';
    if (cells[0] === 'meta' && cells[1] === 'total_excl')    document.getElementById('meta-total').value = cells[2] || '';
  });
}

function togglePaste() {
  const area = document.getElementById('paste-area');
  const btn  = document.querySelector('.paste-toggle');
  if (area.style.display === 'none' || area.style.display === '') {
    area.style.display = 'block';
    btn.textContent = '▼ テキスト直接貼り付けはこちら';
  } else {
    area.style.display = 'none';
    btn.textContent = '▶ テキスト直接貼り付けはこちら';
  }
}

// ===== パーサー =====
function parseCSVFormat(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l);
  const headers = lines[0].split(',').map(h => h.trim());
  const typeIdx = headers.indexOf('type'), serviceIdx = headers.indexOf('service');
  const meta = {}, zansu = [], uketsuke = [], kanryo = [];
  lines.slice(1).forEach(line => {
    const cells = line.split(',').map(c => c.trim());
    const type = cells[typeIdx], svc = cells[serviceIdx];
    if (!type || !svc) return;
    if (type === 'meta') { meta[svc] = cells[2] || ''; return; }
    const row = { service: svc };
    COLS.forEach(col => { const idx = headers.indexOf(col); row[col] = idx >= 0 ? (parseInt(cells[idx]) || 0) : 0; });
    if (type === '残数') zansu.push(row);
    else if (type === '受付') uketsuke.push(row);
    else if (type === '完了') kanryo.push(row);
  });
  if (meta['week'])          document.getElementById('meta-week').value  = meta['week'];
  if (meta['snapshot_date']) document.getElementById('meta-date').value  = meta['snapshot_date'];
  if (meta['total_excl'])    document.getElementById('meta-total').value = meta['total_excl'];
  return { zansu, uketsuke, kanryo };
}

function parseTextFormat(text) {
  const normalized = text.replace(/\t/g, ',');
  const lines = normalized.split('\n').map(l => l.trim()).filter(l => l);
  const isHeader = l => /サービス名/.test(l);
  const isTotal  = l => /^合計/.test(l);
  const zansu = [], uketsuke = [], kanryo = [];
  let currentType = '残数';
  for (const line of lines) {
    if (/受[付け]/.test(line) && !isHeader(line)) { currentType = '受付'; continue; }
    if (/完了/.test(line)     && !isHeader(line)) { currentType = '完了'; continue; }
    if (isHeader(line) || isTotal(line)) continue;
    const cells = line.split(',').map(c => c.trim());
    if (cells.length < 4 || !cells[0]) continue;
    const row = { service: cells[0],
      障害: parseInt(cells[1])||0, イベント: parseInt(cells[2])||0,
      問い合わせ: parseInt(cells[4])||0, 定例運用: parseInt(cells[5])||0,
      非定例運用: parseInt(cells[6])||0, 相談: parseInt(cells[7])||0,
      クレーム: parseInt(cells[8])||0, 作業依頼: parseInt(cells[9])||0 };
    if (currentType === '残数') zansu.push(row);
    else if (currentType === '受付') uketsuke.push(row);
    else if (currentType === '完了') kanryo.push(row);
  }
  return { zansu, uketsuke, kanryo };
}

function detectAndParse(text) {
  const firstLine = text.trim().split('\n')[0];
  const isCSV = /^type,service/.test(firstLine);
  document.getElementById('format-badge').textContent = isCSV ? 'CSV形式' : 'テキスト形式';
  document.getElementById('format-badge').style.background = isCSV ? '#E1F5EE' : '#EEF3F9';
  document.getElementById('format-badge').style.color = isCSV ? '#0F6E56' : '#1E3A5F';
  return isCSV ? parseCSVFormat(text) : parseTextFormat(text);
}

// ===== 集計 =====
function sum(row)     { return COLS.reduce((a,c)=>a+(row[c]||0),0); }
function sumExcl(row) { return ['問い合わせ','定例運用','非定例運用','相談','クレーム','作業依頼'].reduce((a,c)=>a+(row[c]||0),0); }
function destroyChart(id) { if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];} }

// ===== 反映 =====
function applyData() {
  const text = document.getElementById('raw-input').value;
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';
  if (!text.trim()) { errEl.textContent = 'ファイルをドロップするかテキストを貼り付けてください。'; errEl.style.display='block'; return; }

  let sections;
  try { sections = detectAndParse(text); }
  catch(e) { errEl.textContent = '解析エラー: '+e.message; errEl.style.display='block'; return; }

  const { zansu, uketsuke, kanryo } = sections;
  if (zansu.length===0 && uketsuke.length===0) {
    errEl.textContent = 'データが読み取れませんでした。形式を確認してください。';
    errEl.style.display='block'; return;
  }

  const week     = document.getElementById('meta-week').value  || '（週未設定）';
  const snapDate = document.getElementById('meta-date').value  || '（日付未設定）';
  const totalExclInput = parseInt(document.getElementById('meta-total').value)||0;

  document.getElementById('header-meta').textContent = `対象週：${week}　スナップショット：${snapDate}`;
  document.getElementById('dashboard').style.display = 'block';

  const services = zansu.length>0 ? zansu.map(r=>r.service) : uketsuke.map(r=>r.service);
  const totalUketsuke  = uketsuke.reduce((a,r)=>a+sum(r),0);
  const totalKanryo    = kanryo.reduce((a,r)=>a+sum(r),0);
  const totalZansu     = zansu.reduce((a,r)=>a+sum(r),0);
  const totalZansuExcl = zansu.reduce((a,r)=>a+sumExcl(r),0);
  const diff = totalUketsuke - totalKanryo;
  const totalExcl = totalExclInput || totalZansuExcl;

  // メトリクス
  document.getElementById('metrics').innerHTML = [
    { label:`残数（${snapDate}・障害/イベント除く）`, val:totalExcl+'件', cls:'' },
    { label:'残数合計（全カテゴリ）',  val:totalZansu+'件',    cls:'' },
    { label:'受付（週間）',            val:totalUketsuke+'件', cls:'' },
    { label:'完了（週間）',            val:totalKanryo+'件',   cls:'' },
    { label:'週間差分（受付−完了）',   val:(diff>=0?'+':'')+diff+'件', cls:diff>0?'up':'down', sub:diff>0?'積み残し増':'消化超過' },
  ].map(m=>`<div class="metric"><div class="metric-label">${m.label}</div><div class="metric-val ${m.cls||''}">${m.val}</div>${m.sub?`<div class="metric-sub">${m.sub}</div>`:''}</div>`).join('');

  // アラート
  const svcStats = services.map(svc=>{
    const z=zansu.find(r=>r.service===svc)||{};
    const u=uketsuke.find(r=>r.service===svc)||{};
    const k=kanryo.find(r=>r.service===svc)||{};
    return {svc,uTotal:sum(u),kTotal:sum(k),zFault:(z['障害']||0)+(z['イベント']||0),diff:sum(u)-sum(k)};
  }).sort((a,b)=>(b.zFault+b.uTotal)-(a.zFault+a.uTotal));

  const alertItems=[];
  svcStats.forEach(s=>{
    if(s.zFault>=3) alertItems.push({cls:'danger',title:`[要対応] ${s.svc}`,body:`障害・イベント残数 ${s.zFault}件。週間受付 ${s.uTotal}件 / 完了 ${s.kTotal}件。`});
    else if(s.diff>2) alertItems.push({cls:'warn',title:`[注視] ${s.svc}`,body:`受付 ${s.uTotal}件 > 完了 ${s.kTotal}件（差分 +${s.diff}件）。`});
    else if(s.kTotal>s.uTotal&&s.kTotal>=3) alertItems.push({cls:'ok',title:`[順調] ${s.svc}`,body:`受付 ${s.uTotal}件 < 完了 ${s.kTotal}件。積み残し解消が進んでいます。`});
  });
  if(alertItems.length===0) alertItems.push({cls:'ok',title:'今週は要対応サービスなし',body:'全サービス正常範囲内です。'});
  if(alertItems.length%2!==0) alertItems.push({cls:'ok',title:'全体サマリー',body:`受付合計 ${totalUketsuke}件 / 完了合計 ${totalKanryo}件。差分 ${diff>=0?'+':''}${diff}件。`});
  document.getElementById('alerts').innerHTML = alertItems.slice(0,4).map(a=>
    `<div class="alert ${a.cls}"><div class="alert-title">${a.title}</div><div class="alert-body">${a.body}</div></div>`).join('');

  // グラフ
  ['zansu','rcbar','donut'].forEach(destroyChart);
  chartInstances['zansu']=new Chart(document.getElementById('chart-zansu'),{type:'bar',
    data:{labels:services,datasets:[{label:'残数',data:services.map(s=>sumExcl(zansu.find(r=>r.service===s)||{})),backgroundColor:C.blue}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},maxRotation:45}},y:{ticks:{font:{size:9}}}}}});
  chartInstances['rcbar']=new Chart(document.getElementById('chart-rcbar'),{type:'bar',
    data:{labels:services,datasets:[
      {label:'受付',data:services.map(s=>sum(uketsuke.find(r=>r.service===s)||{})),backgroundColor:C.blue},
      {label:'完了',data:services.map(s=>sum(kanryo.find(r=>r.service===s)||{})),backgroundColor:C.teal}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{font:{size:10}}}},scales:{x:{ticks:{font:{size:9},maxRotation:45}},y:{ticks:{font:{size:9}}}}}});
  const catTotals=COLS.map(c=>uketsuke.reduce((a,r)=>a+(r[c]||0),0));
  chartInstances['donut']=new Chart(document.getElementById('chart-donut'),{type:'doughnut',
    data:{labels:COLS.map((c,i)=>`${c}(${catTotals[i]})`),datasets:[{data:catTotals,backgroundColor:[C.red,C.amber,C.blue,C.teal,C.purple,C.coral,C.gray,'#333'],borderWidth:1,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:9},boxWidth:10}}}}});

  // 残数テーブル
  const totalsZ=COLS.map(c=>zansu.reduce((a,r)=>a+(r[c]||0),0));
  document.getElementById('table-zansu').innerHTML=`
    <tr><th style="text-align:left;min-width:160px">サービス</th>${COLS.map(c=>`<th>${c}</th>`).join('')}<th>合計</th></tr>
    ${zansu.map(r=>`<tr><td class="svc">${r.service}</td>${COLS.map(c=>{const v=r[c]||0;
      const st=(c==='障害'&&v>0)?'style="color:#E24B4A;font-weight:bold"':(c==='イベント'&&v>0)?'style="color:#BA7517;font-weight:bold"':'';
      return `<td ${st}>${v||''}</td>`;}).join('')}<td style="font-weight:bold">${sum(r)}</td></tr>`).join('')}
    <tr class="total-row"><td class="svc">合計</td>${totalsZ.map(v=>`<td>${v||''}</td>`).join('')}<td>${totalsZ.reduce((a,b)=>a+b,0)}</td></tr>`;

  // アクションテーブル
  document.getElementById('table-action').innerHTML=`
    <tr><th style="text-align:left;min-width:160px">サービス</th><th style="min-width:60px">優先度</th><th>アクション</th><th style="min-width:70px">担当</th></tr>
    ${svcStats.filter(s=>s.uTotal>0||s.zFault>0).map(s=>{
      let pri,cls,action;
      if(s.zFault>=3){pri='要対応';cls='danger';action=`障害・イベント残数 ${s.zFault}件。内容確認と根本原因の特定を優先。`;}
      else if(s.diff>2){pri='注視';cls='warn';action=`受付が完了を ${s.diff}件上回っている。来週の推移を確認。`;}
      else{pri='順調';cls='ok';action=`受付 ${s.uTotal}件 / 完了 ${s.kTotal}件。現状維持で継続監視。`;}
      return `<tr><td class="svc">${s.svc}</td><td class="center"><span class="badge ${cls}">${pri}</span></td><td>${action}</td><td class="center">担当GR</td></tr>`;
    }).join('')}`;

  document.getElementById('footer').textContent=`最終更新: ${new Date().toLocaleString('ja-JP')}　対象週: ${week}`;
  document.getElementById('dashboard').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
