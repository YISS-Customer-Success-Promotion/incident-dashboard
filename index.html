<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS推進部 インシデントダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Meiryo','Yu Gothic',sans-serif;}
body{background:#F0F4F8;color:#1A2A3A;font-size:13px;}
.hdr{background:#1E3A5F;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;}
.hdr h1{font-size:16px;font-weight:bold;color:#fff;}
.hdr .meta{font-size:12px;color:#CADCFC;text-align:right;}
#input-section{background:#fff;border-bottom:2px solid #1E3A5F;padding:16px 20px;}
.drop{border:2px dashed #B0C4D8;border-radius:10px;padding:28px 20px;text-align:center;cursor:pointer;background:#F7FAFD;margin-bottom:12px;transition:all 0.2s;}
.drop.over{border-color:#1E3A5F;background:#EEF3F9;}
.drop.done{border-color:#1D9E75;background:#E8F8F2;}
.drop .icon{font-size:32px;margin-bottom:6px;}
.drop .lbl{font-size:13px;color:#4A6080;}
.drop .lbl b{color:#1E3A5F;}
.drop .sub{font-size:11px;color:#888;margin-top:4px;}
.ctrl{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-bottom:8px;}
.ctrl .f label{font-size:11px;color:#4A6080;display:block;margin-bottom:3px;}
.ctrl .f input{font-size:12px;padding:5px 8px;border:1px solid #B0C4D8;border-radius:4px;}
.ctrl .f input[type=date]{width:145px;}
.ctrl .f input[type=number]{width:80px;}
.ctrl .f .hint{font-size:10px;color:#888;margin-top:2px;}
.btn{background:#1E3A5F;color:#fff;border:none;border-radius:6px;padding:9px 24px;font-size:13px;font-weight:bold;cursor:pointer;}
.btn:hover{background:#2C5282;}
.pdisp{font-size:12px;color:#1E3A5F;background:#EEF3F9;border-radius:6px;padding:6px 12px;margin-bottom:6px;display:none;}
.smsg{font-size:12px;padding:6px 10px;border-radius:4px;display:none;margin-top:6px;}
.smsg.ok{background:#E8F8F2;color:#0A4A30;}
.smsg.err{background:#FFF0F0;color:#7A1212;}
.container{max-width:1280px;margin:0 auto;padding:14px 16px;}
#dashboard{display:none;}
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
.metric{background:#fff;border-radius:8px;padding:10px 14px;border:0.5px solid #dde3ea;}
.metric-label{font-size:11px;color:#4A6080;margin-bottom:4px;line-height:1.4;}
.metric-val{font-size:26px;font-weight:bold;color:#1E3A5F;}
.metric-val.up{color:#E24B4A;}.metric-val.dn{color:#1D9E75;}
.metric-sub{font-size:10px;color:#4A6080;margin-top:2px;}
.alerts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.alert{border-radius:8px;padding:10px 14px;border:1px solid;}
.alert-title{font-size:12px;font-weight:bold;margin-bottom:4px;}
.alert-body{font-size:11px;line-height:1.5;}
.alert.danger{background:#FFF0F0;border-color:#E24B4A;}
.alert.danger .alert-title{color:#7A1212;}.alert.danger .alert-body{color:#9B3030;}
.alert.warn{background:#FFF5E6;border-color:#BA7517;}
.alert.warn .alert-title{color:#5C3000;}.alert.warn .alert-body{color:#7A4A00;}
.alert.ok{background:#E8F8F2;border-color:#1D9E75;}
.alert.ok .alert-title{color:#0A4A30;}.alert.ok .alert-body{color:#145C3A;}
.charts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;}
.chart-card{background:#fff;border-radius:8px;padding:12px;border:0.5px solid #dde3ea;}
.chart-card h3{font-size:12px;font-weight:bold;color:#1E3A5F;margin-bottom:8px;}
.table-card{background:#fff;border-radius:8px;padding:12px;border:0.5px solid #dde3ea;margin-bottom:14px;overflow-x:auto;}
.table-card h3{font-size:12px;font-weight:bold;color:#1E3A5F;margin-bottom:8px;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{background:#1E3A5F;color:#fff;padding:6px 8px;text-align:center;white-space:nowrap;}
td{padding:5px 8px;border-bottom:0.5px solid #E0E8F0;text-align:center;white-space:nowrap;}
td.svc{text-align:left;font-weight:bold;min-width:160px;}
tr:nth-child(even) td{background:#F5F8FC;}
tr.total-row td{background:#EEF3F9 !important;font-weight:bold;}
.hi{color:#E24B4A;font-weight:bold;}
.badge{display:inline-block;font-size:10px;font-weight:bold;padding:2px 8px;border-radius:99px;}
.badge.danger{background:#FCEBEB;color:#A32D2D;border:1px solid #E24B4A;}
.badge.warn{background:#FAEEDA;color:#7A4A00;border:1px solid #BA7517;}
.badge.ok{background:#E1F5EE;color:#0F6E56;border:1px solid #1D9E75;}
footer{text-align:center;font-size:10px;color:#888;padding:16px;}
</style>
</head>
<body>
<div class="hdr">
  <h1>CS推進部 インシデントダッシュボード</h1>
  <div class="meta" id="hdr-meta">XLSXをドロップしてください</div>
</div>
<div id="input-section">
  <div class="drop" id="dz" onclick="document.getElementById('fi').click()">
    <div class="icon">📊</div>
    <div class="lbl"><b>インシデント一覧XLSXをここにドラッグ＆ドロップ</b></div>
    <div class="sub">またはクリックしてファイルを選択</div>
    <input type="file" id="fi" accept=".xlsx,.xls" style="display:none">
  </div>
  <div class="ctrl">
    <div class="f">
      <label>集計基準日</label>
      <input type="date" id="md" onchange="updPd()">
      <div class="hint">※未入力は本日</div>
    </div>
    <div class="f">
      <label>集計期間（営業日数）</label>
      <input type="number" id="mdy" value="7" min="1" max="60" onchange="updPd()">
      <div class="hint">※土日除く</div>
    </div>
    <button class="btn" onclick="apply()">▶ 反映</button>
  </div>
  <div class="pdisp" id="pd"></div>
  <div class="smsg" id="sm"></div>
</div>
<div class="container">
  <div id="dashboard">
    <div class="metrics" id="metrics"></div>
    <div class="alerts" id="alerts"></div>
    <div class="charts">
      <div class="chart-card"><h3>残数（Open）カテゴリ別</h3><div style="position:relative;height:220px"><canvas id="cz"></canvas></div></div>
      <div class="chart-card"><h3>受付 vs 完了（集計期間）</h3><div style="position:relative;height:220px"><canvas id="cr"></canvas></div></div>
      <div class="chart-card"><h3>受付カテゴリ内訳</h3><div style="position:relative;height:220px"><canvas id="cd"></canvas></div></div>
    </div>
    <div class="table-card"><h3>残数明細（Openのみ）</h3><table id="tz"></table></div>
    <div class="table-card"><h3 id="wt">受付・完了明細</h3><table id="tw"></table></div>
    <div class="table-card"><h3>ネクストアクション</h3><table id="ta"></table></div>
  </div>
</div>
<footer id="footer">CS推進部 インシデントダッシュボード</footer>
<script>
const C={bl:'#378ADD',tl:'#1D9E75',rd:'#E24B4A',am:'#BA7517',co:'#D85A30',pu:'#7F77DD',gy:'#888780',dk:'#445566'};
const CATS=['障害','イベント','問い合わせ','定例運用','非定例運用','相談','クレーム','作業依頼'];
const CC=[C.rd,C.am,C.bl,C.tl,C.pu,C.co,C.gy,C.dk];
let ci={},raw=null;

const dz=document.getElementById('dz'),fi=document.getElementById('fi');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');const f=e.dataTransfer.files[0];if(f)load(f);});
fi.addEventListener('change',e=>{if(e.target.files[0])load(e.target.files[0]);});

function isWd(d){const w=d.getDay();return w!==0&&w!==6;}
function fromDt(base,n){let d=new Date(base);d.setHours(0,0,0,0);let c=0;while(c<n){d.setDate(d.getDate()-1);if(isWd(d))c++;}d.setHours(0,0,0,0);return d;}
function fmt(d){return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;}
function updPd(){
  const dv=document.getElementById('md').value,n=parseInt(document.getElementById('mdy').value)||7;
  const b=dv?new Date(dv):new Date();b.setHours(23,59,59,999);
  const f=fromDt(b,n);
  const el=document.getElementById('pd');el.style.display='block';
  el.textContent=`集計期間：${fmt(f)} 〜 ${fmt(b)}（${n}営業日）`;
}

function load(file){
  msg('読み込み中...','ok');
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      let hi=-1;
      for(let i=0;i<rows.length;i++){
        if(rows[i].some(c=>String(c).includes('インシデント番号'))){hi=i;break;}
      }
      if(hi<0){msg('ヘッダー行が見つかりません','err');return;}
      const hd=rows[hi].map(h=>String(h).trim());
      const ix={
        svc:hd.findIndex(h=>h==='サービス名'),
        cat:hd.findIndex(h=>h==='インシデントカテゴリ'),
        stat:hd.findIndex(h=>h==='ステータス'),
        rcv:hd.findIndex(h=>h==='受付日時'),
        done:hd.findIndex(h=>h==='完了日時'),
      };
      if(ix.svc<0)ix.svc=hd.findIndex(h=>h.includes('サービス名'));
      if(ix.cat<0)ix.cat=hd.findIndex(h=>h.includes('インシデントカテゴリ'));
      if(ix.stat<0)ix.stat=hd.findIndex(h=>h.includes('ステータス')&&!h.includes('サブ'));
      if(ix.rcv<0)ix.rcv=hd.findIndex(h=>h.includes('受付日時'));
      if(ix.done<0)ix.done=hd.findIndex(h=>h.includes('完了日時'));
      if(ix.svc<0||ix.cat<0||ix.stat<0||ix.rcv<0){msg('必要な列が見つかりません','err');return;}
      raw=rows.slice(hi+1).filter(r=>r[ix.svc]).map(r=>({
        svc:String(r[ix.svc]).trim(),
        cat:nc(String(r[ix.cat]||'').trim()),
        stat:String(r[ix.stat]||'').trim(),
        rcv:pd(r[ix.rcv]),
        done:pd(r[ix.done]),
      }));
      const scnt={};raw.forEach(r=>{scnt[r.stat]=(scnt[r.stat]||0)+1;});
      const sinfo=Object.entries(scnt).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`${k}:${v}件`).join(' / ');
      dz.classList.add('done');
      dz.querySelector('.lbl').innerHTML=`<b>${file.name}</b>`;
      dz.querySelector('.sub').textContent=`${raw.length}件 読み込み完了`;
      msg(`読み込み完了 ${raw.length}件 | ${sinfo}`,'ok');
    }catch(e){msg('エラー: '+e.message,'err');}
  };
  r.readAsArrayBuffer(file);
}

function pd(v){
  if(!v)return null;
  if(v instanceof Date)return isNaN(v)?null:v;
  const s=String(v).trim();if(!s)return null;
  const m=s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m)return new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3]));
  return null;
}
function nc(c){
  if(/障害/.test(c))return'障害';if(/イベント/.test(c))return'イベント';
  if(/問い合わせ|問合/.test(c))return'問い合わせ';if(/定例運用/.test(c))return'定例運用';
  if(/非定例/.test(c))return'非定例運用';if(/相談/.test(c))return'相談';
  if(/クレーム/.test(c))return'クレーム';if(/作業依頼/.test(c))return'作業依頼';
  return c||'その他';
}
function msg(t,c){const e=document.getElementById('sm');e.textContent=t;e.className='smsg '+c;e.style.display='block';}
function dc(id){if(ci[id]){ci[id].destroy();delete ci[id];}}
function sr(o){return Object.values(o).reduce((a,b)=>a+b,0);}

function apply(){
  if(!raw){msg('XLSXをドロップしてください','err');return;}
  const dv=document.getElementById('md').value,bz=parseInt(document.getElementById('mdy').value)||7;
  const base=dv?new Date(dv):new Date();base.setHours(23,59,59,999);
  const from=fromDt(base,bz);
  const fs=fmt(from),ts=fmt(base);
  function inP(d){
    if(!d)return false;
    const dd=new Date(d);dd.setHours(12,0,0,0);
    return dd>=from&&dd<=base&&isWd(dd);
  }
  const zr=raw.filter(r=>r.stat!=='完了'&&r.stat!=='取下げ');
  const ur=raw.filter(r=>inP(r.rcv));
  const dr=raw.filter(r=>inP(r.done));
  const svcs=[...new Set(raw.map(r=>r.svc))].sort();
  function tally(rows){
    const m={};svcs.forEach(s=>{m[s]={};CATS.forEach(c=>m[s][c]=0);});
    rows.forEach(r=>{
      if(!m[r.svc]){m[r.svc]={};CATS.forEach(c=>m[r.svc][c]=0);}
      const cat=CATS.includes(r.cat)?r.cat:'その他';
      if(m[r.svc][cat]!==undefined)m[r.svc][cat]++;
    });return m;
  }
  const zm=tally(zr),um=tally(ur),dm=tally(dr);
  const tz=zr.length,tu=ur.length,td=dr.length,diff=tu-td;
  document.getElementById('hdr-meta').textContent=`基準日：${ts}　集計期間：${fs}〜${ts}（${bz}営業日）`;
  document.getElementById('wt').textContent=`受付・完了明細（${fs}〜${ts}・${bz}営業日）`;
  document.getElementById('dashboard').style.display='block';
  document.getElementById('metrics').innerHTML=[
    {l:'残数（Open）',v:tz+'件',c:''},
    {l:`受付（${bz}営業日）`,v:tu+'件',c:''},
    {l:`完了（${bz}営業日）`,v:td+'件',c:''},
    {l:'差分（受付−完了）',v:(diff>=0?'+':'')+diff+'件',c:diff>0?'up':'dn',s:diff>0?'積み残し増':'消化超過'},
    {l:'累積（全件）',v:raw.length+'件',c:''},
  ].map(m=>`<div class="metric"><div class="metric-label">${m.l}</div><div class="metric-val ${m.c}">${m.v}</div>${m.s?`<div class="metric-sub">${m.s}</div>`:''}</div>`).join('');
  const ss=svcs.map(s=>({
    s,z:sr(zm[s]||{}),u:sr(um[s]||{}),d:sr(dm[s]||{}),
    f:(zm[s]?.['障害']||0)+(zm[s]?.['イベント']||0),
  })).sort((a,b)=>(b.f+b.z)-(a.f+a.z));
  const ai=[];
  ss.forEach(s=>{
    if(s.f>=3)ai.push({c:'danger',t:`[要対応] ${s.s}`,b:`障害・イベントOpen ${s.f}件。Open合計 ${s.z}件。受付 ${s.u}件 / 完了 ${s.d}件。`});
    else if(s.u>s.d&&s.u>=3)ai.push({c:'warn',t:`[注視] ${s.s}`,b:`受付 ${s.u}件 > 完了 ${s.d}件（+${s.u-s.d}件）。`});
    else if(s.d>s.u&&s.d>=3)ai.push({c:'ok',t:`[順調] ${s.s}`,b:`受付 ${s.u}件 < 完了 ${s.d}件。解消が進んでいます。`});
  });
  if(ai.length===0)ai.push({c:'ok',t:'今期間は要対応なし',b:'全サービス正常範囲内です。'});
  if(ai.length%2!==0)ai.push({c:'ok',t:'全体',b:`受付 ${tu}件 / 完了 ${td}件。差分 ${diff>=0?'+':''}${diff}件。`});
  document.getElementById('alerts').innerHTML=ai.slice(0,4).map(a=>
    `<div class="alert ${a.c}"><div class="alert-title">${a.t}</div><div class="alert-body">${a.b}</div></div>`).join('');
  ['cz','cr','cd'].forEach(dc);
  ci['cz']=new Chart(document.getElementById('cz'),{type:'bar',
    data:{labels:svcs,datasets:[
      {label:'障害',data:svcs.map(s=>zm[s]?.['障害']||0),backgroundColor:C.rd},
      {label:'イベント',data:svcs.map(s=>zm[s]?.['イベント']||0),backgroundColor:C.am},
      {label:'その他',data:svcs.map(s=>{const z=zm[s]||{};return sr(z)-(z['障害']||0)-(z['イベント']||0);}),backgroundColor:C.bl},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,labels:{font:{size:9}}}},
      scales:{x:{stacked:true,ticks:{font:{size:9},maxRotation:45}},y:{stacked:true,ticks:{font:{size:9}}}}}});
  ci['cr']=new Chart(document.getElementById('cr'),{type:'bar',
    data:{labels:svcs,datasets:[
      {label:'受付',data:svcs.map(s=>sr(um[s]||{})),backgroundColor:C.bl},
      {label:'完了',data:svcs.map(s=>sr(dm[s]||{})),backgroundColor:C.tl},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,labels:{font:{size:10}}}},
      scales:{x:{ticks:{font:{size:9},maxRotation:45}},y:{ticks:{font:{size:9}}}}}});
  const ct=CATS.map(c=>ur.filter(r=>r.cat===c).length);
  ci['cd']=new Chart(document.getElementById('cd'),{type:'doughnut',
    data:{labels:CATS.map((c,i)=>`${c}(${ct[i]})`),datasets:[{data:ct,backgroundColor:CC,borderWidth:1,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'right',labels:{font:{size:9},boxWidth:10}}}}});
  const totZ={};CATS.forEach(c=>totZ[c]=0);
  svcs.forEach(s=>CATS.forEach(c=>totZ[c]+=(zm[s]?.[c]||0)));
  document.getElementById('tz').innerHTML=`
    <tr><th style="text-align:left">サービス</th>${CATS.map(c=>`<th>${c}</th>`).join('')}<th>Open計</th></tr>
    ${svcs.map(s=>{const z=zm[s]||{};return`<tr><td class="svc">${s}</td>
      ${CATS.map(c=>{const v=z[c]||0;const cl=(c==='障害'&&v>0)||(c==='イベント'&&v>0)?'class="hi"':'';
        return`<td ${cl}>${v||''}</td>`;}).join('')}
      <td style="font-weight:bold">${sr(z)}</td></tr>`;}).join('')}
    <tr class="total-row"><td class="svc">合計</td>${CATS.map(c=>`<td>${totZ[c]||''}</td>`).join('')}<td>${Object.values(totZ).reduce((a,b)=>a+b,0)}</td></tr>`;
  const totU={},totD={};CATS.forEach(c=>{totU[c]=0;totD[c]=0;});
  svcs.forEach(s=>{CATS.forEach(c=>{totU[c]+=(um[s]?.[c]||0);totD[c]+=(dm[s]?.[c]||0);});});
  document.getElementById('tw').innerHTML=`
    <tr><th style="text-align:left">サービス</th>
      ${CATS.map(c=>`<th colspan="2" style="background:#2C5282">${c}</th>`).join('')}
      <th colspan="2" style="background:#1A2A3A">合計</th></tr>
    <tr><th></th>${CATS.map(()=>'<th style="background:#3A6A9A;font-size:9px">受付</th><th style="background:#1D6A50;font-size:9px">完了</th>').join('')}
      <th style="background:#2A3A4A;font-size:9px">受付</th><th style="background:#0A4A30;font-size:9px">完了</th></tr>
    ${svcs.map(s=>{const u=um[s]||{},d=dm[s]||{};
      return`<tr><td class="svc">${s}</td>
        ${CATS.map(c=>`<td>${u[c]||''}</td><td>${d[c]||''}</td>`).join('')}
        <td style="font-weight:bold">${sr(u)}</td><td style="font-weight:bold">${sr(d)}</td></tr>`;}).join('')}
    <tr class="total-row"><td class="svc">合計</td>
      ${CATS.map(c=>`<td>${totU[c]||''}</td><td>${totD[c]||''}</td>`).join('')}
      <td>${Object.values(totU).reduce((a,b)=>a+b,0)}</td><td>${Object.values(totD).reduce((a,b)=>a+b,0)}</td></tr>`;
  document.getElementById('ta').innerHTML=`
    <tr><th style="text-align:left;min-width:160px">サービス</th><th style="min-width:60px">優先度</th><th style="text-align:left">アクション</th><th>担当</th></tr>
    ${ss.filter(s=>s.z>0||s.u>0||s.d>0).map(s=>{
      let p,c,a;
      if(s.f>=3){p='要対応';c='danger';a=`障害・イベントOpen ${s.f}件。内容確認と根本原因の特定を優先。`;}
      else if(s.u>s.d+2){p='注視';c='warn';a=`受付 ${s.u}件 > 完了 ${s.d}件（+${s.u-s.d}件）。推移を確認。`;}
      else{p='順調';c='ok';a=`Open ${s.z}件。受付 ${s.u}件 / 完了 ${s.d}件。継続監視。`;}
      return`<tr><td class="svc">${s.s}</td>
        <td style="text-align:center"><span class="badge ${c}">${p}</span></td>
        <td style="text-align:left">${a}</td><td style="text-align:center">担当GR</td></tr>`;
    }).join('')}`;
  msg(`集計完了：Open ${tz}件 / 受付(${bz}営業日) ${tu}件 / 完了(${bz}営業日) ${td}件`,'ok');
  document.getElementById('footer').textContent=`最終更新: ${new Date().toLocaleString('ja-JP')}　集計期間: ${fs}〜${ts}（${bz}営業日）`;
  document.getElementById('dashboard').scrollIntoView({behavior:'smooth'});
}
document.getElementById('md').value=new Date().toISOString().split('T')[0];
updPd();
</script>
