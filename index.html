<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS推進部 インシデントダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Meiryo','Yu Gothic',sans-serif; background:#F0F4F8; color:#1A2A3A; font-size:13px; }
  header { background:#1E3A5F; color:#fff; padding:10px 20px; display:flex; align-items:center; justify-content:space-between; }
  header h1 { font-size:16px; font-weight:bold; }
  header .meta { font-size:12px; color:#CADCFC; text-align:right; line-height:1.6; }

  #input-section { background:#fff; border-bottom:2px solid #1E3A5F; padding:16px 20px; }
  #input-section h2 { font-size:13px; font-weight:bold; color:#1E3A5F; margin-bottom:8px; }

  #drop-zone {
    border:2px dashed #B0C4D8; border-radius:10px;
    padding:28px 20px; text-align:center; cursor:pointer;
    transition:all 0.2s; background:#F7FAFD; margin-bottom:12px;
  }
  #drop-zone.dragover { border-color:#1E3A5F; background:#EEF3F9; }
  #drop-zone.loaded  { border-color:#1D9E75; background:#E8F8F2; }
  #drop-zone .icon { font-size:32px; margin-bottom:6px; }
  #drop-zone .label { font-size:13px; color:#4A6080; }
  #drop-zone .label b { color:#1E3A5F; }
  #drop-zone .sub { font-size:11px; color:#888; margin-top:4px; }
  #drop-zone input[type=file] { display:none; }

  .meta-inputs { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:10px; align-items:flex-end; }
  .meta-inputs .field label { font-size:11px; color:#4A6080; display:block; margin-bottom:3px; }
  .meta-inputs .field input { font-size:12px; border:1px solid #B0C4D8; border-radius:4px; padding:5px 8px; }
  .meta-inputs .field .hint { font-size:10px; color:#888; margin-top:2px; }
  .meta-inputs .field input[type=date]   { width:145px; }
  .meta-inputs .field input[type=number] { width:80px; }
  #btn-apply { background:#1E3A5F; color:#fff; border:none; border-radius:6px; padding:9px 24px; font-size:13px; font-weight:bold; cursor:pointer; }
  #btn-apply:hover { background:#2C5282; }
  #period-display { font-size:12px; color:#1E3A5F; background:#EEF3F9; border-radius:6px; padding:6px 12px; display:none; margin-bottom:8px; }
  #status-msg { font-size:12px; margin-top:8px; padding:6px 10px; border-radius:4px; display:none; }
  #status-msg.ok    { background:#E8F8F2; color:#0A4A30; }
  #status-msg.error { background:#FFF0F0; color:#7A1212; }

  .container { max-width:1280px; margin:0 auto; padding:14px 16px; }
  #dashboard { display:none; }

  .metrics { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:14px; }
  .metric { background:#fff; border-radius:8px; padding:10px 14px; border:0.5px solid #dde3ea; }
  .metric-label { font-size:11px; color:#4A6080; margin-bottom:4px; line-height:1.4; }
  .metric-val { font-size:26px; font-weight:bold; color:#1E3A5F; }
  .metric-val.down { color:#1D9E75; }
  .metric-val.up   { color:#E24B4A; }
  .metric-sub { font-size:10px; color:#4A6080; margin-top:2px; }

  .alerts { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .alert { border-radius:8px; padding:10px 14px; border:1px solid; }
  .alert-title { font-size:12px; font-weight:bold; margin-bottom:4px; }
  .alert-body  { font-size:11px; line-height:1.5; }
  .alert.danger { background:#FFF0F0; border-color:#E24B4A; }
  .alert.danger .alert-title { color:#7A1212; }
  .alert.danger .alert-body  { color:#9B3030; }
  .alert.warn { background:#FFF5E6; border-color:#BA7517; }
  .alert.warn .alert-title { color:#5C3000; }
  .alert.warn .alert-body  { color:#7A4A00; }
  .alert.ok { background:#E8F8F2; border-color:#1D9E75; }
  .alert.ok .alert-title { color:#0A4A30; }
  .alert.ok .alert-body  { color:#145C3A; }

  .charts { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:14px; }
  .chart-card { background:#fff; border-radius:8px; padding:12px; border:0.5px solid #dde3ea; }
  .chart-card h3 { font-size:12px; font-weight:bold; color:#1E3A5F; margin-bottom:8px; }

  .table-card { background:#fff; border-radius:8px; padding:12px; border:0.5px solid #dde3ea; margin-bottom:14px; overflow-x:auto; }
  .table-card h3 { font-size:12px; font-weight:bold; color:#1E3A5F; margin-bottom:8px; }
  table { width:100%; border-collapse:collapse; font-size:11px; }
  th { background:#1E3A5F; color:#fff; padding:6px 8px; text-align:center; font-size:10px; white-space:nowrap; }
  td { padding:5px 8px; border-bottom:0.5px solid #E0E8F0; text-align:center; white-space:nowrap; }
  td.svc { text-align:left; font-weight:bold; min-width:160px; }
  tr:nth-child(even) td { background:#F5F8FC; }
  tr.total-row td { background:#EEF3F9 !important; font-weight:bold; }
  .num-hi { color:#E24B4A; font-weight:bold; }
  .badge { display:inline-block; font-size:10px; font-weight:bold; padding:2px 8px; border-radius:99px; }
  .badge.danger { background:#FCEBEB; color:#A32D2D; border:1px solid #E24B4A; }
  .badge.warn   { background:#FAEEDA; color:#7A4A00; border:1px solid #BA7517; }
  .badge.ok     { background:#E1F5EE; color:#0F6E56; border:1px solid #1D9E75; }
  .action-table td { text-align:left; }
  .action-table td.center { text-align:center; }
  footer { text-align:center; font-size:10px; color:#888; padding:16px; }
</style>
</head>
<body>

<header>
  <h1>CS推進部 インシデントダッシュボード</h1>
  <div class="meta" id="header-meta">XLSXファイルをドロップしてください</div>
</header>

<div id="input-section">
  <h2>データ入力</h2>
  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="icon">📊</div>
    <div class="label"><b>インシデント一覧XLSXをここにドラッグ＆ドロップ</b></div>
    <div class="sub">またはクリックしてファイルを選択</div>
    <input type="file" id="file-input" accept=".xlsx,.xls">
  </div>

  <div class="meta-inputs">
    <div class="field">
      <label>集計基準日</label>
      <input type="date" id="meta-date" onchange="updatePeriodDisplay()">
      <div class="hint">※未入力の場合は本日</div>
    </div>
    <div class="field">
      <label>集計期間（営業日数）</label>
      <input type="number" id="meta-days" value="7" min="1" max="60" onchange="updatePeriodDisplay()">
      <div class="hint">※土日を除いた日数</div>
    </div>
    <button id="btn-apply" onclick="applyData()">▶ 反映</button>
  </div>
  <div id="period-display"></div>
  <div id="status-msg"></div>
</div>

<div class="container">
  <div id="dashboard">
    <div class="metrics" id="metrics"></div>
    <div class="alerts"  id="alerts"></div>
    <div class="charts">
      <div class="chart-card">
        <h3>残数（Open）サービス別・カテゴリ別</h3>
        <div style="position:relative;width:100%;height:220px"><canvas id="chart-zansu"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>受付 vs 完了（集計期間内）</h3>
        <div style="position:relative;width:100%;height:220px"><canvas id="chart-rcbar"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>受付カテゴリ内訳（集計期間内）</h3>
        <div style="position:relative;width:100%;height:220px"><canvas id="chart-donut"></canvas></div>
      </div>
    </div>
    <div class="table-card">
      <h3>サービス別 残数明細（Open件数・カテゴリ別）</h3>
      <table id="table-zansu"></table>
    </div>
    <div class="table-card">
      <h3 id="weekly-title">受付・完了 明細（集計期間内）</h3>
      <table id="table-weekly"></table>
    </div>
    <div class="table-card">
      <h3>ネクストアクション</h3>
      <table class="action-table" id="table-action"></table>
    </div>
  </div>
</div>
<footer id="footer">CS推進部 インシデントダッシュボード</footer>

<script>
const C = {blue:'#378ADD',teal:'#1D9E75',red:'#E24B4A',amber:'#BA7517',coral:'#D85A30',purple:'#7F77DD',gray:'#888780'};
let chartInstances = {};
let rawData = null;

const CATS = ['障害','イベント','問い合わせ','定例運用','非定例運用','相談','クレーム','作業依頼'];
const CAT_COLORS = [C.red,C.amber,C.blue,C.teal,C.purple,C.coral,C.gray,'#445'];

// ===== 営業日計算 =====
function isWeekday(d) { const w=d.getDay(); return w!==0&&w!==6; }

// 基準日から過去N営業日前の日付を返す
function calcFromDate(baseDate, bizDays) {
  let d = new Date(baseDate);
  d.setHours(0,0,0,0);
  let count = 0;
  while (count < bizDays) {
    d.setDate(d.getDate()-1);
    if (isWeekday(d)) count++;
  }
  d.setHours(0,0,0,0);
  return d;
}

// 2日付間の営業日数を数える
function countBizDays(from, to) {
  let count=0, d=new Date(from);
  d.setHours(0,0,0,0);
  while (d<=to) { if(isWeekday(d)) count++; d.setDate(d.getDate()+1); }
  return count;
}

function updatePeriodDisplay() {
  const dateInput = document.getElementById('meta-date').value;
  const days = parseInt(document.getElementById('meta-days').value)||7;
  const baseDate = dateInput ? new Date(dateInput) : new Date();
  baseDate.setHours(23,59,59,999);
  const fromDate = calcFromDate(baseDate, days);
  const el = document.getElementById('period-display');
  el.style.display = 'block';
  el.textContent = `集計期間：${fmtDate(fromDate)} 〜 ${fmtDate(baseDate)}（${days}営業日）`;
}

function fmtDate(d) {
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

// ===== ドロップゾーン =====
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
dropZone.addEventListener('dragover', e=>{ e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', ()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e=>{ e.preventDefault(); dropZone.classList.remove('dragover'); const f=e.dataTransfer.files[0]; if(f) loadFile(f); });
fileInput.addEventListener('change', e=>{ if(e.target.files[0]) loadFile(e.target.files[0]); });

function loadFile(file) {
  showStatus('読み込み中...','ok');
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, {type:'array', cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

      // ヘッダー行を探す
      let headerIdx = -1;
      for (let i=0;i<rows.length;i++) {
        if (rows[i].some(c=>String(c).includes('インシデント番号'))) { headerIdx=i; break; }
      }
      if (headerIdx<0) { showStatus('ヘッダー行が見つかりません。','error'); return; }

      const headers = rows[headerIdx].map(h=>String(h).trim());
      const idx = {
        svc:  headers.findIndex(h=>h.includes('サービス名')),
        cat:  headers.findIndex(h=>h.includes('インシデントカテゴリ')),
        stat: headers.findIndex(h=>h.includes('ステータス')),
        rcv:  headers.findIndex(h=>h.includes('受付日時')),
        done: headers.findIndex(h=>h.includes('完了日時')),
      };
      if (idx.svc<0||idx.cat<0||idx.stat<0||idx.rcv<0) {
        showStatus('必要な列が見つかりません。','error'); return;
      }

      rawData = rows.slice(headerIdx+1)
        .filter(r=>r[idx.svc])
        .map(r=>({
          svc:  String(r[idx.svc]).trim(),
          cat:  normCat(String(r[idx.cat]||'').trim()),
          stat: String(r[idx.stat]||'').trim(),
          rcv:  parseDate(r[idx.rcv]),
          done: parseDate(r[idx.done]),
        }));

      dropZone.classList.add('loaded');
      dropZone.querySelector('.label').innerHTML=`<b>${file.name}</b>`;
      dropZone.querySelector('.sub').textContent=`${rawData.length}件 読み込み完了。「反映」を押してください。`;
      showStatus(`${rawData.length}件を読み込みました。「反映」を押してください。`,'ok');
    } catch(e) { showStatus('読み込みエラー: '+e.message,'error'); }
  };
  reader.readAsArrayBuffer(file);
}

function parseDate(v) {
  if (!v) return null;
  if (v instanceof Date) return isNaN(v)?null:v;
  const s = String(v).trim();
  if (!s) return null;
  const m = s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m) return new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3]));
  return null;
}

function normCat(c) {
  if (/障害/.test(c))        return '障害';
  if (/イベント/.test(c))    return 'イベント';
  if (/問い合わせ|問合/.test(c)) return '問い合わせ';
  if (/定例運用/.test(c))    return '定例運用';
  if (/非定例/.test(c))      return '非定例運用';
  if (/相談/.test(c))        return '相談';
  if (/クレーム/.test(c))    return 'クレーム';
  if (/作業依頼/.test(c))    return '作業依頼';
  return c||'その他';
}

function showStatus(msg,cls) {
  const el=document.getElementById('status-msg');
  el.textContent=msg; el.className=cls; el.style.display='block';
}
function destroyChart(id) { if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];} }

// ===== 反映 =====
function applyData() {
  if (!rawData) { showStatus('先にXLSXファイルをドロップしてください。','error'); return; }

  const dateInput = document.getElementById('meta-date').value;
  const bizDays   = parseInt(document.getElementById('meta-days').value)||7;
  const baseDate  = dateInput ? new Date(dateInput) : new Date();
  baseDate.setHours(23,59,59,999);
  const fromDate  = calcFromDate(baseDate, bizDays);

  const fromStr = fmtDate(fromDate);
  const toStr   = fmtDate(baseDate);

  // 期間内判定（土日除く）
  function inPeriod(d) {
    if (!d) return false;
    const dd = new Date(d); dd.setHours(12,0,0,0);
    return dd>=fromDate && dd<=baseDate && isWeekday(dd);
  }

  // 残数：ステータスが完了・取下げ以外＝Open
  const zansuRows = rawData.filter(r=>r.stat!=='完了'&&r.stat!=='取下げ');
  // 受付：集計期間内・営業日・受付日時
  const ukeRows   = rawData.filter(r=>inPeriod(r.rcv));
  // 完了：集計期間内・営業日・完了日時
  const doneRows  = rawData.filter(r=>inPeriod(r.done));

  const svcSet = [...new Set(rawData.map(r=>r.svc))].sort();

  function tally(rows) {
    const m={};
    svcSet.forEach(s=>{m[s]={};CATS.forEach(c=>m[s][c]=0);});
    rows.forEach(r=>{
      if(!m[r.svc]){m[r.svc]={};CATS.forEach(c=>m[r.svc][c]=0);}
      const cat=CATS.includes(r.cat)?r.cat:'その他';
      if(m[r.svc][cat]!==undefined) m[r.svc][cat]++;
    });
    return m;
  }
  function sumRow(o){return Object.values(o).reduce((a,b)=>a+b,0);}

  const zansuMap=tally(zansuRows);
  const ukeMap  =tally(ukeRows);
  const doneMap =tally(doneRows);

  const totalZansu=zansuRows.length;
  const totalUke  =ukeRows.length;
  const totalDone =doneRows.length;
  const diff=totalUke-totalDone;

  document.getElementById('header-meta').textContent=
    `基準日：${toStr}　集計期間：${fromStr}〜${toStr}（${bizDays}営業日）`;
  document.getElementById('weekly-title').textContent=
    `受付・完了 明細（${fromStr}〜${toStr}・${bizDays}営業日）`;
  document.getElementById('dashboard').style.display='block';

  // ---- メトリクス ----
  document.getElementById('metrics').innerHTML=[
    {label:'残数（Open件数）',          val:totalZansu+'件', cls:''},
    {label:`受付（${bizDays}営業日）`,  val:totalUke+'件',   cls:''},
    {label:`完了（${bizDays}営業日）`,  val:totalDone+'件',  cls:''},
    {label:'週間差分（受付−完了）',
      val:(diff>=0?'+':'')+diff+'件',
      cls:diff>0?'up':'down',
      sub:diff>0?'積み残し増':'消化超過'},
    {label:'全インシデント（累積）',     val:rawData.length+'件', cls:''},
  ].map(m=>`<div class="metric">
    <div class="metric-label">${m.label}</div>
    <div class="metric-val ${m.cls||''}">${m.val}</div>
    ${m.sub?`<div class="metric-sub">${m.sub}</div>`:''}
  </div>`).join('');

  // ---- アラート ----
  const svcStats=svcSet.map(svc=>({
    svc,
    zansu:sumRow(zansuMap[svc]||{}),
    uke:  sumRow(ukeMap[svc]||{}),
    done: sumRow(doneMap[svc]||{}),
    fault:(zansuMap[svc]?.['障害']||0)+(zansuMap[svc]?.['イベント']||0),
  })).sort((a,b)=>(b.fault+b.zansu)-(a.fault+a.zansu));

  const alertItems=[];
  svcStats.forEach(s=>{
    if(s.fault>=3) alertItems.push({cls:'danger',title:`[要対応] ${s.svc}`,body:`障害・イベント残数 ${s.fault}件。Open合計 ${s.zansu}件。受付 ${s.uke}件 / 完了 ${s.done}件。`});
    else if(s.uke>s.done&&s.uke>=3) alertItems.push({cls:'warn',title:`[注視] ${s.svc}`,body:`受付 ${s.uke}件 > 完了 ${s.done}件（差分 +${s.uke-s.done}件）。`});
    else if(s.done>s.uke&&s.done>=3) alertItems.push({cls:'ok',title:`[順調] ${s.svc}`,body:`受付 ${s.uke}件 < 完了 ${s.done}件。積み残し解消が進んでいます。`});
  });
  if(alertItems.length===0) alertItems.push({cls:'ok',title:'今期間は要対応サービスなし',body:'全サービス正常範囲内です。'});
  if(alertItems.length%2!==0) alertItems.push({cls:'ok',title:'全体サマリー',body:`受付 ${totalUke}件 / 完了 ${totalDone}件。差分 ${diff>=0?'+':''}${diff}件。`});
  document.getElementById('alerts').innerHTML=alertItems.slice(0,4).map(a=>
    `<div class="alert ${a.cls}"><div class="alert-title">${a.title}</div><div class="alert-body">${a.body}</div></div>`).join('');

  // ---- グラフ ----
  ['zansu','rcbar','donut'].forEach(destroyChart);

  chartInstances['zansu']=new Chart(document.getElementById('chart-zansu'),{type:'bar',
    data:{labels:svcSet,datasets:[
      {label:'障害',   data:svcSet.map(s=>zansuMap[s]?.['障害']||0),   backgroundColor:C.red},
      {label:'イベント',data:svcSet.map(s=>zansuMap[s]?.['イベント']||0),backgroundColor:C.amber},
      {label:'その他', data:svcSet.map(s=>{const z=zansuMap[s]||{};
        return sumRow(z)-(z['障害']||0)-(z['イベント']||0);}),         backgroundColor:C.blue},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,labels:{font:{size:9}}}},
      scales:{x:{stacked:true,ticks:{font:{size:9},maxRotation:45}},
              y:{stacked:true,ticks:{font:{size:9}}}}}});

  chartInstances['rcbar']=new Chart(document.getElementById('chart-rcbar'),{type:'bar',
    data:{labels:svcSet,datasets:[
      {label:'受付',data:svcSet.map(s=>sumRow(ukeMap[s]||{})), backgroundColor:C.blue},
      {label:'完了',data:svcSet.map(s=>sumRow(doneMap[s]||{})),backgroundColor:C.teal},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,labels:{font:{size:10}}}},
      scales:{x:{ticks:{font:{size:9},maxRotation:45}},y:{ticks:{font:{size:9}}}}}});

  const catTotals=CATS.map(c=>ukeRows.filter(r=>r.cat===c).length);
  chartInstances['donut']=new Chart(document.getElementById('chart-donut'),{type:'doughnut',
    data:{labels:CATS.map((c,i)=>`${c}(${catTotals[i]})`),
      datasets:[{data:catTotals,backgroundColor:CAT_COLORS,borderWidth:1,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'right',labels:{font:{size:9},boxWidth:10}}}}});

  // ---- 残数テーブル ----
  const totZ={};CATS.forEach(c=>totZ[c]=0);
  svcSet.forEach(s=>CATS.forEach(c=>totZ[c]+=(zansuMap[s]?.[c]||0)));
  document.getElementById('table-zansu').innerHTML=`
    <tr><th style="text-align:left">サービス</th>${CATS.map(c=>`<th>${c}</th>`).join('')}<th>Open合計</th></tr>
    ${svcSet.map(s=>{const z=zansuMap[s]||{};return `<tr><td class="svc">${s}</td>
      ${CATS.map(c=>{const v=z[c]||0;
        const cl=(c==='障害'&&v>0)||(c==='イベント'&&v>0)?'class="num-hi"':'';
        return `<td ${cl}>${v||''}</td>`;}).join('')}
      <td style="font-weight:bold">${sumRow(z)}</td></tr>`;}).join('')}
    <tr class="total-row"><td class="svc">合計</td>${CATS.map(c=>`<td>${totZ[c]||''}</td>`).join('')}
    <td>${Object.values(totZ).reduce((a,b)=>a+b,0)}</td></tr>`;

  // ---- 受付・完了テーブル ----
  const totU={},totD={};CATS.forEach(c=>{totU[c]=0;totD[c]=0;});
  svcSet.forEach(s=>{CATS.forEach(c=>{totU[c]+=(ukeMap[s]?.[c]||0);totD[c]+=(doneMap[s]?.[c]||0);});});
  document.getElementById('table-weekly').innerHTML=`
    <tr><th style="text-align:left">サービス</th>
      ${CATS.map(c=>`<th colspan="2" style="background:#2C5282">${c}</th>`).join('')}
      <th colspan="2" style="background:#1A2A3A">合計</th></tr>
    <tr><th></th>${CATS.map(()=>
      '<th style="background:#3A6A9A;font-size:9px">受付</th><th style="background:#1D6A50;font-size:9px">完了</th>').join('')}
      <th style="background:#2A3A4A;font-size:9px">受付</th><th style="background:#0A4A30;font-size:9px">完了</th></tr>
    ${svcSet.map(s=>{const u=ukeMap[s]||{},d=doneMap[s]||{};
      return `<tr><td class="svc">${s}</td>
        ${CATS.map(c=>`<td>${u[c]||''}</td><td>${d[c]||''}</td>`).join('')}
        <td style="font-weight:bold">${sumRow(u)}</td>
        <td style="font-weight:bold">${sumRow(d)}</td></tr>`;}).join('')}
    <tr class="total-row"><td class="svc">合計</td>
      ${CATS.map(c=>`<td>${totU[c]||''}</td><td>${totD[c]||''}</td>`).join('')}
      <td>${Object.values(totU).reduce((a,b)=>a+b,0)}</td>
      <td>${Object.values(totD).reduce((a,b)=>a+b,0)}</td></tr>`;

  // ---- アクションテーブル ----
  document.getElementById('table-action').innerHTML=`
    <tr><th style="text-align:left;min-width:160px">サービス</th>
    <th style="min-width:60px">優先度</th><th>アクション</th><th>担当</th></tr>
    ${svcStats.filter(s=>s.zansu>0||s.uke>0||s.done>0).map(s=>{
      let pri,cls,action;
      if(s.fault>=3){pri='要対応';cls='danger';
        action=`障害・イベントOpen残 ${s.fault}件。内容確認と根本原因の特定を優先。`;}
      else if(s.uke>s.done+2){pri='注視';cls='warn';
        action=`受付 ${s.uke}件 > 完了 ${s.done}件（+${s.uke-s.done}件）。来週の推移を確認。`;}
      else{pri='順調';cls='ok';
        action=`Open ${s.zansu}件。受付 ${s.uke}件 / 完了 ${s.done}件。現状維持で継続監視。`;}
      return `<tr><td class="svc">${s.svc}</td>
        <td style="text-align:center"><span class="badge ${cls}">${pri}</span></td>
        <td>${action}</td><td style="text-align:center">担当GR</td></tr>`;
    }).join('')}`;

  showStatus(`集計完了：Open残数 ${totalZansu}件 / 受付(${bizDays}営業日) ${totalUke}件 / 完了(${bizDays}営業日) ${totalDone}件`,'ok');
  document.getElementById('footer').textContent=`最終更新: ${new Date().toLocaleString('ja-JP')}　集計期間: ${fromStr}〜${toStr}（${bizDays}営業日）`;
  document.getElementById('dashboard').scrollIntoView({behavior:'smooth'});
}

// 初期設定
document.getElementById('meta-date').value = new Date().toISOString().split('T')[0];
updatePeriodDisplay();
</script>
</body>
</html>
